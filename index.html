<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Kate & Jensen 가계부</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a; --bg2: #16162a; --bg3: #1e1e35;
      --card: #1e1e35; --card2: #252540;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6af7; --text: #f0efff;
      --text2: #9896b8; --text3: #5f5e80;
      --income: #6af7c8; --expense: #f76a8a; --fixed: #f7d06a;
      --radius: 16px; --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

    .header { background: linear-gradient(135deg, #1a1a35 0%, #0f0f1a 100%); padding: 20px 20px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .app-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); }
    .app-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .month-nav { display: flex; align-items: center; gap: 12px; transition: opacity .2s; }
    .month-nav.hidden { opacity: 0; pointer-events: none; }
    .month-nav button { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .month-label { font-size: 16px; font-weight: 700; min-width: 90px; text-align: center; }

    .tabs { display: flex; gap: 6px; padding: 16px 20px 0; }
    .tab { flex: 1; padding: 10px 0; border: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; background: var(--bg3); color: var(--text3); }
    .tab.active { background: var(--card); color: var(--text); border-bottom: 2px solid var(--accent); }

    .content { padding: 20px; }

    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .summary-card { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .summary-card.income::before { background: var(--income); }
    .summary-card.expense::before { background: var(--expense); }
    .summary-card.fixed::before { background: var(--fixed); }
    .summary-card.balance::before { background: var(--accent); }
    .summary-card.wide { grid-column: 1 / -1; }
    .s-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.5px; }
    .s-value { font-size: 22px; font-weight: 700; }
    .s-value.income { color: var(--income); }
    .s-value.expense { color: var(--expense); }
    .s-value.fixed { color: var(--fixed); }
    .s-value.balance-pos { color: var(--income); }
    .s-value.balance-neg { color: var(--expense); }
    .s-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

    .section { margin-bottom: 24px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--text2); }
    .add-btn { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .ghost-btn { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; cursor: pointer; white-space: nowrap; }

    .item-list { display: flex; flex-direction: column; gap: 8px; }
    .item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
    .item-left { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .item-name { font-size: 14px; font-weight: 500; }
    .item-meta { font-size: 11px; color: var(--text3); }
    .item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .item-amount { font-size: 15px; font-weight: 700; }
    .item-amount.income { color: var(--income); }
    .item-amount.expense { color: var(--expense); }
    .item-amount.fixed { color: var(--fixed); }
    .action-btns { display: flex; gap: 2px; }
    .icon-btn { background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px; opacity: 0.55; transition: opacity .2s; }
    .icon-btn:hover { opacity: 1; }

    /* 카테고리 그룹 */
    .cat-group { margin-bottom: 16px; }
    .cat-group-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
    .cat-group-name { font-size: 12px; font-weight: 700; color: var(--fixed); }
    .cat-group-total { font-size: 12px; color: var(--fixed); }

    .empty-state { text-align: center; padding: 30px; color: var(--text3); font-size: 13px; background: var(--card); border-radius: var(--radius); border: 1px dashed var(--border); }

    .progress-bar-bg { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 6px; }
    .progress-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
    .progress-bar-fill.ok { background: var(--income); }
    .progress-bar-fill.warn { background: var(--fixed); }
    .progress-bar-fill.over { background: var(--expense); }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-top: 4px; }

    .notice { background: rgba(247,208,106,0.08); border: 1px solid rgba(247,208,106,0.2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 12px; color: var(--fixed); margin-bottom: 20px; line-height: 1.7; }

    /* 카테고리 비교 카드 */
    .compare-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
    .compare-row { margin-bottom: 16px; }
    .compare-row:last-of-type { margin-bottom: 0; }
    .compare-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; cursor: pointer; user-select: none; padding: 2px 0; }
    .compare-header:hover .compare-cat { color: var(--text); }
    .compare-cat { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .compare-arrow { font-size: 10px; color: var(--text3); transition: transform .2s; }
    .compare-arrow.open { transform: rotate(180deg); }
    .compare-status { font-size: 11px; font-weight: 600; }
    .compare-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .compare-bar-label { font-size: 10px; color: var(--text3); width: 24px; text-align: right; flex-shrink: 0; }
    .compare-bar-bg { flex: 1; background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
    .compare-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
    .compare-bar-amount { font-size: 11px; width: 80px; text-align: right; flex-shrink: 0; }

    /* 펼치기 패널 */
    .detail-panel { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
    .detail-panel.open { max-height: 1000px; }
    .detail-inner { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-col-title { font-size: 11px; font-weight: 700; margin-bottom: 6px; padding-left: 2px; }
    .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; background: var(--bg3); border-radius: 8px; margin-bottom: 4px; }
    .detail-item-left { display: flex; flex-direction: column; gap: 2px; }
    .detail-item-name { font-size: 12px; }
    .detail-item-date { font-size: 10px; color: var(--text3); }
    .detail-item-amount { font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .detail-empty { font-size: 12px; color: var(--text3); padding: 6px 10px; }

    .compare-total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; margin-top: 14px; border-top: 1px solid var(--border); font-size: 13px; }

    /* 범례 */
    .legend { display: flex; justify-content: flex-end; gap: 16px; margin-bottom: 14px; font-size: 11px; color: var(--text3); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; border-top: 1px solid var(--border); animation: slideUp .3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { background: var(--bg3); border: none; color: var(--text2); width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; transition: border-color .2s; }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .submit-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
    select.form-input option { background: var(--bg2); }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; background: none; border: none; padding: 12px 0; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--text3); font-family: 'Noto Sans KR', sans-serif; font-size: 10px; transition: color .2s; }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 22px; }

    .loading { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .cat-chip { display: inline-block; background: var(--bg3); border-radius: 6px; padding: 2px 7px; font-size: 10px; color: var(--text3); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">Kate & Jensen</div>
      <div class="app-sub">가계부</div>
    </div>
    <div class="month-nav" id="monthNav">
      <button id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextMonth">›</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="overview">📊 요약</button>
  <button class="tab" data-tab="income">💰 수입</button>
  <button class="tab" data-tab="fixed">📌 예상지출</button>
  <button class="tab" data-tab="expense">💳 실제지출</button>
</div>

<div class="content" id="mainContent">
  <div class="loading"><div class="spinner"></div>불러오는 중...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle"></span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" data-tab="overview"><span class="nav-icon">📊</span>요약</button>
  <button class="nav-btn" data-tab="income"><span class="nav-icon">💰</span>수입</button>
  <button class="nav-btn" data-tab="fixed"><span class="nav-icon">📌</span>예상지출</button>
  <button class="nav-btn" data-tab="expense"><span class="nav-icon">💳</span>실제지출</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx4i6rXiHX6rd0bH-pM8SK40hDOeFQVgo",
  authDomain: "kate-and-jensen-finance.firebaseapp.com",
  projectId: "kate-and-jensen-finance",
  storageBucket: "kate-and-jensen-finance.firebasestorage.app",
  messagingSenderId: "166215384595",
  appId: "1:166215384595:web:95b620ef8fc5c04e5a09e6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let currentTab = 'overview';
let data = { income: [], fixed: [], expense: [] };

const DEFAULT_CATS = ['식비', '교통', '쇼핑', '의료', '문화/여가', '교육', '공과금', '주거', '보험', '통신', '구독', '대출', '기타'];
let SHARED_CATS = JSON.parse(localStorage.getItem('shared_cats') || JSON.stringify(DEFAULT_CATS));

function saveCats() { localStorage.setItem('shared_cats', JSON.stringify(SHARED_CATS)); }

function addCategoryUI() {
  const name = prompt('추가할 카테고리 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (SHARED_CATS.includes(trimmed)) { alert('이미 있는 카테고리예요'); return; }
  SHARED_CATS.push(trimmed);
  saveCats();
  showToast('✅ 카테고리 추가됨 (예상·실제지출 공통 적용)');
  render();
}

const fmt = n => Number(n).toLocaleString('ko-KR') + '원';
const monthKey = () => `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
const todayStr = () => new Date().toISOString().slice(0,10);
const showToast = msg => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
};

// ── Firebase ──
async function loadData() {
  const mk = monthKey();
  const snap = await getDocs(query(collection(db, 'entries'), where('month','==', mk)));
  data.income = [];
  data.expense = [];
  snap.forEach(d => {
    const e = { id: d.id, ...d.data() };
    if (e.type === 'income') data.income.push(e);
    else if (e.type === 'expense') data.expense.push(e);
  });
  data.income.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  data.expense.sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const fixedSnap = await getDocs(query(collection(db,'entries'), where('type','==','fixed')));
  data.fixed = [];
  fixedSnap.forEach(d => data.fixed.push({ id: d.id, ...d.data() }));
  data.fixed.sort((a,b) => (a.name||'').localeCompare(b.name||''));
}

async function addEntry(entry) {
  if (entry.type !== 'fixed') entry.month = monthKey();
  await addDoc(collection(db, 'entries'), entry);
  await loadData(); render();
  showToast('✅ 저장되었습니다');
}
async function updateEntry(id, fields) {
  await updateDoc(doc(db, 'entries', id), fields);
  await loadData(); render();
  showToast('✏️ 수정되었습니다');
}
async function deleteEntry(id) {
  await deleteDoc(doc(db, 'entries', id));
  await loadData(); render();
  showToast('🗑️ 삭제되었습니다');
}

// ── 카테고리별 그룹 목록 ──
function itemListByCategory(items, type) {
  if (!items.length) return `<div class="empty-state">내역이 없어요</div>`;
  const groups = {};
  items.forEach(i => {
    const c = i.category || '기타';
    if (!groups[c]) groups[c] = [];
    groups[c].push(i);
  });
  const sign = type === 'income' ? '+' : '-';
  return Object.entries(groups).map(([cat, catItems]) => {
    const catTotal = catItems.reduce((s,i) => s + Number(i.amount), 0);
    return `
      <div class="cat-group">
        <div class="cat-group-header">
          <span class="cat-group-name">${cat}</span>
          <span class="cat-group-total">${sign}${fmt(catTotal)}</span>
        </div>
        <div class="item-list">
          ${catItems.map(i => `
            <div class="item">
              <div class="item-left">
                <div class="item-name">${i.name}</div>
                <div class="item-meta">${i.date||''} ${i.note ? `· ${i.note}` : ''}</div>
              </div>
              <div class="item-right">
                <div class="item-amount ${type}">${sign}${fmt(i.amount)}</div>
                <div class="action-btns">
                  <button class="icon-btn edit-btn" data-id="${i.id}" data-type="${type}">✏️</button>
                  <button class="icon-btn del-btn" data-id="${i.id}">🗑️</button>
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

// ── 일반 목록 ──
function itemListHtml(items, type, showActions) {
  if (!items.length) return `<div class="empty-state">내역이 없어요</div>`;
  const sign = type === 'income' ? '+' : '-';
  return `<div class="item-list">${items.map(i => `
    <div class="item">
      <div class="item-left">
        <div class="item-name">${i.name}</div>
        <div class="item-meta">${i.date||''} ${i.category ? `<span class="cat-chip">${i.category}</span>` : ''} ${i.note ? `· ${i.note}` : ''}</div>
      </div>
      <div class="item-right">
        <div class="item-amount ${type}">${sign}${fmt(i.amount)}</div>
        ${showActions ? `
          <div class="action-btns">
            <button class="icon-btn edit-btn" data-id="${i.id}" data-type="${type}">✏️</button>
            <button class="icon-btn del-btn" data-id="${i.id}">🗑️</button>
          </div>` : ''}
      </div>
    </div>`).join('')}</div>`;
}

// ── 카테고리 비교 ──
function renderCategoryComparison(fixedItems, expenseItems) {
  const fixedByCat = {};
  const expenseByCat = {};
  const fixedItemsByCat = {};
  const expenseItemsByCat = {};

  fixedItems.forEach(i => {
    const c = i.category || '기타';
    fixedByCat[c] = (fixedByCat[c] || 0) + Number(i.amount);
    if (!fixedItemsByCat[c]) fixedItemsByCat[c] = [];
    fixedItemsByCat[c].push(i);
  });
  expenseItems.forEach(i => {
    const c = i.category || '기타';
    expenseByCat[c] = (expenseByCat[c] || 0) + Number(i.amount);
    if (!expenseItemsByCat[c]) expenseItemsByCat[c] = [];
    expenseItemsByCat[c].push(i);
  });

  const allCats = [...new Set([...Object.keys(fixedByCat), ...Object.keys(expenseByCat)])];
  if (!allCats.length) return `<div class="empty-state">예상지출 또는 실제지출을 입력하면 비교가 나타나요</div>`;

  const sorted = allCats.sort((a,b) => (fixedByCat[b]||0) - (fixedByCat[a]||0));
  const totalFixed   = Object.values(fixedByCat).reduce((s,v) => s+v, 0);
  const totalExpense = Object.values(expenseByCat).reduce((s,v) => s+v, 0);
  const totalOver = totalExpense > totalFixed && totalFixed > 0;

  const rows = sorted.map(cat => {
    const planned = fixedByCat[cat] || 0;
    const actual  = expenseByCat[cat] || 0;
    const maxVal  = Math.max(planned, actual, 1);
    const plannedPct = (planned / maxVal * 100).toFixed(1);
    const actualPct  = (actual  / maxVal * 100).toFixed(1);
    const over = actual > planned && planned > 0;
    const statusColor = over ? 'var(--expense)' : (actual > 0 && planned > 0) ? 'var(--income)' : 'var(--text3)';
    const statusText  = over ? `+${fmt(actual - planned)} 초과` : (actual > 0 && planned > 0) ? `${fmt(planned - actual)} 절약` : '';
    const actualBarColor = over ? 'var(--expense)' : 'var(--income)';
    const uid = 'cat_' + cat.replace(/[^a-zA-Z0-9가-힣]/g, '_') + '_' + Math.random().toString(36).slice(2,6);

    const fixedListHtml = (fixedItemsByCat[cat] || []).length
      ? (fixedItemsByCat[cat] || []).map(i => `
          <div class="detail-item">
            <span class="detail-item-name">${i.name}</span>
            <span class="detail-item-amount" style="color:var(--fixed)">-${fmt(i.amount)}</span>
          </div>`).join('')
      : `<div class="detail-empty">항목 없음</div>`;

    const expenseListHtml = (expenseItemsByCat[cat] || []).length
      ? (expenseItemsByCat[cat] || []).map(i => `
          <div class="detail-item">
            <div class="detail-item-left">
              <span class="detail-item-name">${i.name}</span>
              ${i.date ? `<span class="detail-item-date">${i.date}</span>` : ''}
            </div>
            <span class="detail-item-amount" style="color:${actualBarColor}">-${fmt(i.amount)}</span>
          </div>`).join('')
      : `<div class="detail-empty">항목 없음</div>`;

    return `
      <div class="compare-row">
        <div class="compare-header" data-uid="${uid}">
          <span class="compare-cat">
            ${cat}
            <span class="compare-arrow" id="arrow_${uid}">▼</span>
          </span>
          <span class="compare-status" style="color:${statusColor}">${statusText}</span>
        </div>
        <div class="compare-bar-wrap">
          <span class="compare-bar-label">예상</span>
          <div class="compare-bar-bg"><div class="compare-bar-fill" style="width:${plannedPct}%;background:var(--fixed)"></div></div>
          <span class="compare-bar-amount" style="color:var(--fixed)">${planned ? fmt(planned) : '-'}</span>
        </div>
        <div class="compare-bar-wrap">
          <span class="compare-bar-label">실제</span>
          <div class="compare-bar-bg"><div class="compare-bar-fill" style="width:${actualPct}%;background:${actualBarColor}"></div></div>
          <span class="compare-bar-amount" style="color:${actualBarColor}">${actual ? fmt(actual) : '-'}</span>
        </div>
        <div class="detail-panel" id="detail_${uid}">
          <div class="detail-inner">
            <div>
              <div class="detail-col-title" style="color:var(--fixed)">📌 예상 목록</div>
              ${fixedListHtml}
            </div>
            <div>
              <div class="detail-col-title" style="color:${actualBarColor}">💳 실제 목록</div>
              ${expenseListHtml}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="compare-card" id="compareCard">
      <div class="legend">
        <span style="font-size:11px;color:var(--text3)">카테고리 클릭 시 상세 표시</span>
        <span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:var(--fixed)"></span>예상</span>
        <span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:var(--income)"></span>실제</span>
      </div>
      ${rows}
      <div class="compare-total-row">
        <span style="color:var(--text3)">전체 합계</span>
        <div style="display:flex;gap:16px">
          <span style="color:var(--fixed)">예상 ${fmt(totalFixed)}</span>
          <span style="color:${totalOver?'var(--expense)':'var(--income)'}">실제 ${fmt(totalExpense)}</span>
        </div>
      </div>
    </div>`;
}

// ── 비교 카드 클릭 이벤트 등록 ──
function bindCompareEvents() {
  document.querySelectorAll('.compare-header[data-uid]').forEach(header => {
    header.addEventListener('click', () => {
      const uid = header.getAttribute('data-uid');
      const panel = document.getElementById('detail_' + uid);
      const arrow = document.getElementById('arrow_' + uid);
      if (!panel) return;
      const isOpen = panel.classList.contains('open');
      panel.classList.toggle('open', !isOpen);
      if (arrow) arrow.classList.toggle('open', !isOpen);
    });
  });
}

// ── 렌더링 ──
function render() {
  updateMonthLabel();
  document.getElementById('monthNav').classList.toggle('hidden', currentTab === 'fixed');

  const totalIncome  = data.income.reduce((s,i) => s + Number(i.amount), 0);
  const totalFixed   = data.fixed.reduce((s,i) => s + Number(i.amount), 0);
  const totalExpense = data.expense.reduce((s,i) => s + Number(i.amount), 0);
  const balance = totalIncome - totalExpense;
  const content = document.getElementById('mainContent');

  if (currentTab === 'overview') {
    const pct = totalIncome > 0 ? Math.min(totalExpense / totalIncome * 100, 100) : 0;
    const fc = pct < 70 ? 'ok' : pct < 90 ? 'warn' : 'over';
    content.innerHTML = `
      <div class="summary-grid">
        <div class="summary-card income">
          <div class="s-label">💰 총 수입</div>
          <div class="s-value income">${fmt(totalIncome)}</div>
        </div>
        <div class="summary-card expense">
          <div class="s-label">💳 실제 지출</div>
          <div class="s-value expense">${fmt(totalExpense)}</div>
        </div>
        <div class="summary-card balance wide">
          <div class="s-label">📈 잔액 (수입 − 실제지출)</div>
          <div class="s-value ${balance>=0?'balance-pos':'balance-neg'}">${fmt(balance)}</div>
          <div class="s-sub">예상지출 ${fmt(totalFixed)}은 별도 관리</div>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-title">지출 현황</div></div>
        <div class="summary-card wide">
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:4px">
            <span>실제지출 / 수입</span>
            <span style="font-weight:700">${fmt(totalExpense)} / ${fmt(totalIncome)}</span>
          </div>
          <div class="progress-bar-bg"><div class="progress-bar-fill ${fc}" style="width:${pct}%"></div></div>
          <div class="progress-label"><span>${pct.toFixed(0)}% 사용</span><span>잔여 ${fmt(Math.max(balance,0))}</span></div>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-title">카테고리별 예상 vs 실제</div></div>
        ${renderCategoryComparison(data.fixed, data.expense)}
      </div>
      <div class="section">
        <div class="section-header"><div class="section-title">최근 지출</div></div>
        ${itemListHtml(data.expense.slice(0,5), 'expense', false)}
      </div>`;
    bindCompareEvents();
  }

  else if (currentTab === 'income') {
    content.innerHTML = `
      <div class="summary-grid">
        <div class="summary-card income wide">
          <div class="s-label">이번 달 총 수입</div>
          <div class="s-value income">${fmt(totalIncome)}</div>
          <div class="s-sub">${data.income.length}건</div>
        </div>
      </div>
      <div class="section">
        <div class="section-header">
          <div class="section-title">수입 내역</div>
          <button class="add-btn" id="addBtn">+ 추가</button>
        </div>
        ${itemListHtml(data.income, 'income', true)}
      </div>`;
    document.getElementById('addBtn').addEventListener('click', () => openModal('income', null));
  }

  else if (currentTab === 'fixed') {
    const byCatFixed = {};
    data.fixed.forEach(i => { const c = i.category||'기타'; byCatFixed[c]=(byCatFixed[c]||0)+Number(i.amount); });
    content.innerHTML = `
      <div class="notice">📌 예상지출은 월 구분 없이 관리되며, 잔액 계산에 포함되지 않습니다.</div>
      <div class="summary-grid">
        <div class="summary-card fixed wide">
          <div class="s-label">월 예상 지출 합계</div>
          <div class="s-value fixed">${fmt(totalFixed)}</div>
          <div class="s-sub">${data.fixed.length}건 등록됨</div>
        </div>
      </div>
      ${Object.keys(byCatFixed).length ? `
        <div class="section">
          <div class="section-header"><div class="section-title">카테고리별 합계</div></div>
          <div class="item-list">
            ${Object.entries(byCatFixed).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`
              <div class="item">
                <div class="item-left"><div class="item-name">${c}</div></div>
                <div class="item-right"><div class="item-amount fixed">-${fmt(a)}</div></div>
              </div>`).join('')}
          </div>
        </div>` : ''}
      <div class="section">
        <div class="section-header">
          <div class="section-title">예상 지출 목록</div>
          <div style="display:flex;gap:8px">
            <button class="ghost-btn" id="addCatBtn">+ 카테고리</button>
            <button class="add-btn" id="addBtn">+ 추가</button>
          </div>
        </div>
        ${itemListByCategory(data.fixed, 'fixed')}
      </div>`;
    document.getElementById('addBtn').addEventListener('click', () => openModal('fixed', null));
    document.getElementById('addCatBtn').addEventListener('click', () => addCategoryUI());
  }

  else if (currentTab === 'expense') {
    const byCat = {};
    data.expense.forEach(i => { const c = i.category||'기타'; byCat[c]=(byCat[c]||0)+Number(i.amount); });
    content.innerHTML = `
      <div class="summary-grid">
        <div class="summary-card expense wide">
          <div class="s-label">이번 달 실제 지출</div>
          <div class="s-value expense">${fmt(totalExpense)}</div>
          <div class="s-sub">${data.expense.length}건</div>
        </div>
      </div>
      ${Object.keys(byCat).length ? `
        <div class="section">
          <div class="section-header"><div class="section-title">카테고리별 합계</div></div>
          <div class="item-list">
            ${Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`
              <div class="item">
                <div class="item-left"><div class="item-name">${c}</div></div>
                <div class="item-right"><div class="item-amount expense">-${fmt(a)}</div></div>
              </div>`).join('')}
          </div>
        </div>` : ''}
      <div class="section">
        <div class="section-header">
          <div class="section-title">지출 내역</div>
          <div style="display:flex;gap:8px">
            <button class="ghost-btn" id="addCatBtn">+ 카테고리</button>
            <button class="add-btn" id="addBtn">+ 추가</button>
          </div>
        </div>
        ${itemListByCategory(data.expense, 'expense')}
      </div>`;
    document.getElementById('addBtn').addEventListener('click', () => openModal('expense', null));
    document.getElementById('addCatBtn').addEventListener('click', () => addCategoryUI());
  }

  // 수정/삭제 버튼
  document.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = data[btn.dataset.type].find(i => i.id === btn.dataset.id);
      if (item) openModal(btn.dataset.type, item);
    });
  });
  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (confirm('삭제할까요?')) await deleteEntry(btn.dataset.id);
    });
  });
}

// ── 모달 ──
function openModal(type, item) {
  const isEdit = !!item;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalTitle').textContent =
    ({ income:'💰 수입', fixed:'📌 예상지출', expense:'💳 실제지출' }[type]) + (isEdit ? ' 수정' : ' 추가');
  const body = document.getElementById('modalBody');
  const catOptions = SHARED_CATS.map(c => `<option ${item?.category===c?'selected':''}>${c}</option>`).join('');

  if (type === 'income') {
    body.innerHTML = `
      <div class="form-group"><label class="form-label">항목명</label>
        <input class="form-input" id="f_name" placeholder="예: 월급" value="${item?.name||''}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">금액 (원)</label>
          <input class="form-input" id="f_amount" type="number" placeholder="0" value="${item?.amount||''}"></div>
        <div class="form-group"><label class="form-label">날짜</label>
          <input class="form-input" id="f_date" type="date" value="${item?.date||todayStr()}"></div>
      </div>
      <div class="form-group"><label class="form-label">메모 (선택)</label>
        <input class="form-input" id="f_note" placeholder="메모" value="${item?.note||''}"></div>
      <button class="submit-btn" id="submitBtn">${isEdit?'수정하기':'저장'}</button>`;
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const name = document.getElementById('f_name').value.trim();
      const amount = document.getElementById('f_amount').value;
      if (!name || !amount) { alert('항목명과 금액을 입력해주세요'); return; }
      const fields = { name, amount: Number(amount), date: document.getElementById('f_date').value, note: document.getElementById('f_note').value.trim() };
      closeModal();
      isEdit ? await updateEntry(item.id, fields) : await addEntry({ type:'income', ...fields });
    });
  }
  else if (type === 'fixed') {
    body.innerHTML = `
      <div class="form-group"><label class="form-label">항목명</label>
        <input class="form-input" id="f_name" placeholder="예: 월세, 보험료" value="${item?.name||''}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">금액 (원)</label>
          <input class="form-input" id="f_amount" type="number" placeholder="0" value="${item?.amount||''}"></div>
        <div class="form-group"><label class="form-label">카테고리</label>
          <select class="form-input" id="f_cat">${catOptions}</select></div>
      </div>
      <div class="form-group"><label class="form-label">메모 (선택)</label>
        <input class="form-input" id="f_note" placeholder="메모" value="${item?.note||''}"></div>
      <button class="submit-btn" id="submitBtn">${isEdit?'수정하기':'저장'}</button>`;
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const name = document.getElementById('f_name').value.trim();
      const amount = document.getElementById('f_amount').value;
      if (!name || !amount) { alert('항목명과 금액을 입력해주세요'); return; }
      const fields = { name, amount: Number(amount), category: document.getElementById('f_cat').value, note: document.getElementById('f_note').value.trim() };
      closeModal();
      isEdit ? await updateEntry(item.id, fields) : await addEntry({ type:'fixed', ...fields });
    });
  }
  else if (type === 'expense') {
    body.innerHTML = `
      <div class="form-group"><label class="form-label">항목명</label>
        <input class="form-input" id="f_name" placeholder="예: 점심식사" value="${item?.name||''}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">금액 (원)</label>
          <input class="form-input" id="f_amount" type="number" placeholder="0" value="${item?.amount||''}"></div>
        <div class="form-group"><label class="form-label">날짜</label>
          <input class="form-input" id="f_date" type="date" value="${item?.date||todayStr()}"></div>
      </div>
      <div class="form-group"><label class="form-label">카테고리</label>
        <select class="form-input" id="f_cat">${catOptions}</select></div>
      <button class="submit-btn" id="submitBtn">${isEdit?'수정하기':'저장'}</button>`;
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const name = document.getElementById('f_name').value.trim();
      const amount = document.getElementById('f_amount').value;
      if (!name || !amount) { alert('항목명과 금액을 입력해주세요'); return; }
      const fields = { name, amount: Number(amount), date: document.getElementById('f_date').value, category: document.getElementById('f_cat').value };
      closeModal();
      isEdit ? await updateEntry(item.id, fields) : await addEntry({ type:'expense', ...fields });
    });
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal();
});

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = `${currentYear}.${String(currentMonth).padStart(2,'0')}`;
}
document.getElementById('prevMonth').addEventListener('click', async () => {
  if (currentMonth===1){currentMonth=12;currentYear--;}else currentMonth--;
  await reload();
});
document.getElementById('nextMonth').addEventListener('click', async () => {
  if (currentMonth===12){currentMonth=1;currentYear++;}else currentMonth++;
  await reload();
});

document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', async () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab,.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll(`[data-tab="${currentTab}"]`).forEach(b => b.classList.add('active'));
    await reload();
  });
});

async function reload() {
  document.getElementById('mainContent').innerHTML =
    '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  await loadData();
  render();
}

reload();
</script>
</body>
</html>
